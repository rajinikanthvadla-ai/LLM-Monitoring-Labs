global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:

  # Our LLM metrics app (load generator)
  - job_name: "llm-metrics-app"
    static_configs:
      - targets: ["metrics-app:8000"]
    metrics_path: /metrics

  # Prometheus itself
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Pushgateway — receives metrics from batch/script runs
  - job_name: "pushgateway"
    honor_labels: true
    static_configs:
      - targets: ["pushgateway:9091"]

  # Grafana self-monitoring
  - job_name: "grafana"
    static_configs:
      - targets: ["grafana:3000"]
    metrics_path: /metrics
